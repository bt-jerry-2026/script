# 1. 映射结构用于 WebSocket
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 2. HTTP (80) 强制跳转 HTTPS
# 首页加载优化第一步：减少不必要的 HTTP 停留，直接全站加密，利用 HTTP/2 的多路复用
server {
    listen 80;
    listen [::]:80;
    server_name xshuliner.online www.xshuliner.online;
    
    # 强制跳转到 HTTPS 主域名，保持 SEO 一致性
    return 301 https://xshuliner.online$request_uri;
}

# 3. HTTPS www 域名跳转到主域名
server {
    listen 443 ssl;
    http2 on;
    server_name www.xshuliner.online;

    ssl_certificate /etc/letsencrypt/live/xshuliner.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xshuliner.online/privkey.pem;

    return 301 https://xshuliner.online$request_uri;
}

# 4. HTTPS 主服务器配置
server {
    listen 443 ssl;
    http2 on; # 必须开启，大幅提升多小文件并行加载速度
    server_name xshuliner.online;

    ssl_certificate /etc/letsencrypt/live/xshuliner.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xshuliner.online/privkey.pem;

    # SSL 性能优化
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    
    add_header Strict-Transport-Security "max-age=63072000" always;

    # --- 首页加载速度优化：Gzip 策略 ---
    gzip on;
    gzip_static on; # 如果有 .gz 预压缩文件直接读取
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5; # 5-6 是性能与压缩率的最佳平衡点
    gzip_min_length 1k;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml font/opentype font/otf font/ttf;

    # --- 静态资源与首页缓存策略 ---
    root /usr/share/nginx/html;

    # 首页 HTML：永远检查更新，防止前端发版后用户浏览器还在读旧缓存
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # 静态资源（带 Hash 的 JS/CSS/图片）：强缓存 1 年
    # 增加 webp 和 avif 支持
    location ~* \.(?:js|css|jpg|jpeg|gif|png|ico|svg|webp|avif|woff|woff2|ttf|otf|mp4|webm|mov)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- 视频流媒体优化：/final/ 路径 ---
    # 支持进度条拖拽、任意点播放（Range 请求）
    location ^~ /final/ {
        # 禁用 gzip，避免影响 Range 请求
        gzip off;
        
        # 开启异步 IO 和 DirectIO，提升大文件读取性能
        aio on;
        directio 512k;
        
        # 确保 Range 和 If-Range 请求头透传到后端（如有反向代理）
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        
        # 禁用代理缓冲，确保流式传输
        proxy_buffering off;
        
        # 视频文件缓存策略
        location ~* \.(?:mp4|webm|mov|mkv|avi|flv)$ {
            expires 7d;
            add_header Cache-Control "public, must-revalidate";
            add_header Accept-Ranges bytes;
        }
    }

    # --- 反向代理部分 ---

    # 1. /openclaw 配置 (保持独立，不受其他 location 干扰)
    location ^~ /openclaw {
        proxy_pass http://127.0.0.1:18789;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # 针对长连接优化的超时
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # 2. /api 路由接口反向代理
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3000; # 注意：如果后端代码已经处理了 /api 前缀，这里不用加 /api/
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 接口一般不建议开启 proxy_buffering，减少延迟
        proxy_buffering off;
    }

    # 3. SPA 路由支持
    location / {
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 安全：禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
