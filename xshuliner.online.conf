# 保持原有的 map 结构
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 1. 所有的 HTTP (80) 请求统一跳转
server {
    listen 80;
    listen [::]:80; # 增加对 IPv6 的支持
    server_name xshuliner.online www.xshuliner.online;
    return 301 https://xshuliner.online$request_uri;
}

# 2. www 域名统一跳转到主域名 (443)
server {
    listen 443 ssl;
    http2 on;
    server_name www.xshuliner.online;

    ssl_certificate /etc/letsencrypt/live/xshuliner.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xshuliner.online/privkey.pem;

    return 301 https://xshuliner.online$request_uri;
}

# 3. 主服务器配置
server {
    listen 443 ssl;
    http2 on;
    server_name xshuliner.online;

    ssl_certificate /etc/letsencrypt/live/xshuliner.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xshuliner.online/privkey.pem;

    # 安全增强
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    
    # 开启 HSTS (建议确认 HTTPS 稳定后再开启)
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 开启 Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    # 后端 API / WebSocket 
    # 匹配 /openclaw 和 /openclaw/
    location /openclaw {
        proxy_pass http://127.0.0.1:18789; 
        proxy_http_version 1.1;
        
        # 统一 Header 设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # 超时长连接配置
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # 静态资源根目录
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # 针对图片/字体等静态资源设置缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }
}
